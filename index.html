<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BL TECH 영업 포털 (초안)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="app">
  <aside class="side" id="side">
    <div class="brand">
      <div class="logo">BL</div>
      <div><b>BL TECH</b><span>영업 포털 · 초안</span></div>
    </div>
    <nav class="nav" id="nav">
      <div class="grp">고객 발굴 센터</div>
      <a data-view="disc-dash"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>발굴 동선 · 대시보드</a>
      <a data-view="disc-market" class="sub">시장분석 · STP</a>
      <a data-view="disc-leads" class="sub">잠재 거래처 리스트</a>
      <div class="grp">국내영업</div>
      <a data-view="dom-dash"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>대시보드</a>
      <a data-view="dom-agencies" class="sub">대리점 관리</a>
      <a data-view="dom-shipping" class="sub">출고 의뢰</a>
      <a data-view="dom-returns" class="sub">반품 · 교환 내역</a>
      <a data-view="dom-ledger" class="sub">출고현황 · 원장 발송</a>
      <div class="grp">해외영업</div>
      <a data-view="ov-dash"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18"/></svg>대시보드</a>
      <a data-view="ov-pricelist" class="sub">신규 고객</a>
      <a data-view="ov-orders" class="sub">수주 · 생산</a>
      <a data-view="ov-agencies" class="sub">거래처 관리</a>
      <a data-view="ov-shipping" class="sub">선적 · 물류</a>
      <a data-view="ov-docs" class="sub">수출서류</a>
      <div class="grp">공통</div>
      <a data-view="cert-hub"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5z"/><path d="m9 12 2 2 4-4"/></svg>인증·규제 허브</a>
    </nav>
    <div class="foot">Phase 1 프로토타입 · 샘플 데이터</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="iconbtn" id="menuBtn" style="display:none">≡</button>
      <div>
        <h1 id="ttl">대시보드</h1>
        <div class="crumb" id="crumb">국내영업</div>
      </div>
      <div class="spacer"></div>
      <input class="search" placeholder="거래처·리드 검색">
      <button class="iconbtn" title="알림"><svg width="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="dot"></span></button>
      <div class="avatar">영</div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script src="assets/app.js"></script>
</body>
</html>
